name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify committed mobile project files
        run: |
          required_mobile_files=(
            mobile/app.json
            mobile/eas.json
            mobile/package.json
            mobile/package-lock.json
            mobile/babel.config.js
            mobile/tsconfig.json
          )

          for file in "${required_mobile_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required committed mobile file: $file" >&2
              exit 1
            fi
          done

      - name: Verify committed web project files
        run: |
          required_web_files=(
            web/package.json
            web/package-lock.json
            web/tsconfig.json
            web/next.config.ts
            web/app/layout.tsx
          )

          for file in "${required_web_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required committed web file: $file" >&2
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Test backend
        run: node --test dist/tests/*.test.js

      - name: Audit backend dependencies
        # Keep this as a hard gate for new high/critical advisories. If a high
        # severity issue is accepted temporarily, document the mitigation in the
        # PR and pin/override the dependency in the same change.
        run: npm audit --audit-level=high

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Mobile typecheck
        run: npm run typecheck

      - name: Mobile tests with coverage
        run: npm run test:ci

      - name: Export Expo bundles
        run: npm run export:ci

      - name: Upload mobile coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage

      - name: Upload Expo export bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-export
          path: mobile/dist

      - name: Audit mobile dependencies
        # Keep this as a hard gate for new high/critical advisories. If a high
        # severity issue is accepted temporarily, document the mitigation in the
        # PR and pin/override the dependency in the same change.
        run: npm audit --audit-level=high

  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Web typecheck
        run: npm run typecheck

      - name: Web unit tests
        run: npm run test:ci

      - name: Web production build
        run: npm run build

  admin-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        run: npm ci

      - name: Admin lint
        run: npm run lint

      - name: Admin typecheck
        run: npm run typecheck

      - name: Admin unit tests
        run: npm run test:ci

      - name: Admin build
        run: npm run build

  optional-app-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build optional app workspaces when present
        run: |
          set -euo pipefail

          run_optional_app() {
            local label="$1"
            shift

            for candidate in "$@"; do
              if [ -f "$candidate/package.json" ]; then
                echo "Detected $label workspace at $candidate"
                pushd "$candidate" >/dev/null
                npm ci
                npm run lint --if-present
                npm run typecheck --if-present
                if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts['test:ci'] ? 0 : 1)"; then
                  npm run test:ci
                else
                  npm test --if-present
                fi
                npm run build --if-present
                popd >/dev/null
                return 0
              fi
            done

            echo "No $label workspace found; skipping."
          }

          run_optional_app "passenger web" passenger-web apps/passenger-web
          run_optional_app "passenger mobile" passenger-mobile mobile-passenger apps/passenger-mobile
          run_optional_app "restaurant admin" restaurant-admin apps/restaurant-admin

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./helm/drive-platform

      - name: Helm template
        run: helm template drive-platform ./helm/drive-platform --namespace drive-development > rendered-manifests.yaml

      - name: Upload rendered manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-helm-manifests
          path: rendered-manifests.yaml

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate
