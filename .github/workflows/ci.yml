name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify committed Flutter platform files
        run: |
          required_platform_files=(
            mobile/android/gradlew
            mobile/android/gradlew.bat
            mobile/android/gradle/wrapper/gradle-wrapper.jar
            mobile/android/gradle/wrapper/gradle-wrapper.properties
            mobile/ios/Podfile
            mobile/ios/Runner/Info.plist
            mobile/ios/Runner.xcodeproj/project.pbxproj
            mobile/ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme
            mobile/ios/Runner.xcworkspace/contents.xcworkspacedata
            mobile/ios/Flutter/Debug.xcconfig
            mobile/ios/Flutter/Release.xcconfig
          )

          for file in "${required_platform_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required committed platform file: $file" >&2
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: node --test dist/*.test.js

  mobile-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Mobile typecheck
        run: npm run typecheck

      - name: Mobile tests with coverage
        run: npm run test:ci

      - name: Upload mobile coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage
