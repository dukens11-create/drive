workflows:
  android-release:
    name: Drive Android release APK (Expo + EAS)
    environment:
      groups:
        - expo_credentials
      node: 20.19.4
      vars:
        EAS_LOCAL_BUILD_SKIP_CLEANUP: "1" # Keep local build outputs so APK verification can inspect generated files.
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: release/**
          include: true
          source: true
    scripts:
      - name: Show workflow config
        script: |
          echo "Running workflow: android-release"
          echo "Branch: ${CM_BRANCH:-unknown}"
          echo "Using grouped environment variables"

      - name: Install mobile dependencies
        working_directory: mobile
        script: npm ci
      - name: Typecheck Expo app
        working_directory: mobile
        script: npm run typecheck
      - name: Install EAS CLI
        script: npm install --global eas-cli
      - name: Debug EXPO_TOKEN presence
        # Requires EXPO_TOKEN in the expo_credentials group in Codemagic environment variables.
        script: |
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is missing"
            echo "Check Codemagic UI settings:"
            echo "- Variable name must be EXPO_TOKEN"
            echo "- Group must be expo_credentials"
            echo "- Secret must be enabled"
            echo "- Workflow android-release must import expo_credentials"
            exit 1
          fi
          echo "EXPO_TOKEN is present"
      - name: Initialize EAS project
        # Links this repo to an EAS project on expo.dev so subsequent eas build
        # commands can run in --non-interactive mode without requiring 'eas init'
        # to be run manually. Requires EXPO_TOKEN to be set.
        working_directory: mobile
        script: npx eas init --force --non-interactive
      - name: Ensure Android project exists for Gradle release build
        working_directory: mobile
        script: npx expo prebuild --platform android
      - name: Verify Gradle release settings for APK assembly
        working_directory: mobile/android
        script: |
          ./gradlew :app:assembleRelease --dry-run
          grep -Eq "signingConfig\\s+" app/build.gradle || { echo "Missing signingConfig in app/build.gradle release settings"; exit 1; }
      - name: Build APK with EAS production profile
        working_directory: mobile
        # output path is relative to `mobile/` because this step runs with `working_directory: mobile`
        script: npx eas build --platform android --profile production --local --non-interactive --output app-release.apk
      - name: Verify APK artifact exists
        script: test -f mobile/app-release.apk
    artifacts:
      - mobile/app-release.apk
