workflows:
  mobile-ci:
    name: Drive Flutter app
    environment:
      flutter: stable
      vars:
        PROJECT_DIR: mobile
        PROJECT_NAME: drive_mobile
    working_directory: $PROJECT_DIR
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Bootstrap Flutter platforms
        script: |
          platforms=""
          if [ ! -d android ]; then
            platforms="android"
          fi
          if [ ! -d ios ]; then
            platforms="${platforms:+$platforms,}ios"
          fi
          if [ -n "$platforms" ]; then
            flutter create --project-name "$PROJECT_NAME" --platforms="$platforms" .
          fi
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Analyze Flutter app
        script: |
          flutter analyze
      - name: Run Flutter tests
        script: |
          flutter test
      - name: Build Android release APK
        script: |
          flutter build apk --release
      - name: Build iOS release app bundle
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/iphoneos/Runner.app
