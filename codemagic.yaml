workflows:
  android-release:
    name: Drive Android release APK (Expo + EAS)
    environment:
      node: 20.11.1
      vars:
        EAS_LOCAL_BUILD_SKIP_CLEANUP: "1" # Keep local build outputs so APK verification can inspect generated files.
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install mobile dependencies
        working_directory: mobile
        script: npm ci
      - name: Typecheck Expo app
        working_directory: mobile
        script: npm run typecheck
      - name: Install EAS CLI
        script: npm install --global eas-cli
      - name: Validate EAS authentication
        # Keep EXPO_TOKEN in Codemagic secure environment variables for non-interactive production builds.
        script: test -n "$EXPO_TOKEN" || { echo "EXPO_TOKEN environment variable is not set. Configure it in Codemagic secure environment variables."; exit 1; }
      - name: Ensure Android project exists for Gradle release build
        working_directory: mobile
        script: npx expo prebuild --platform android
      - name: Verify Gradle release settings for APK assembly
        working_directory: mobile/android
        script: |
          ./gradlew :app:assembleRelease --dry-run
          grep -Eq "signingConfig\\s+" app/build.gradle || { echo "Missing signingConfig in app/build.gradle release settings"; exit 1; }
      - name: Build APK with EAS production profile
        working_directory: mobile
        # output path is relative to `mobile/` because this step runs with `working_directory: mobile`
        script: npx eas build --platform android --profile production --local --non-interactive --output app-release.apk
      - name: Verify APK artifact exists
        script: test -f mobile/app-release.apk
    artifacts:
      - mobile/app-release.apk
