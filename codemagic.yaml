workflows:
  mobile-expo-build:
    name: Drive Expo app (mobile subfolder)
    environment:
      node: 20.11.1
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install mobile dependencies
        working_directory: mobile
        script: npm ci
      - name: Typecheck Expo app
        working_directory: mobile
        script: npm run typecheck
      - name: Export Expo bundle
        working_directory: mobile
        script: npx expo export --platform android --platform ios
    artifacts:
      - mobile/dist/**
