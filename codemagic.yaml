workflows:
  mobile-ci:
    name: Drive Flutter app
    environment:
      flutter: stable
      vars:
        PROJECT_DIR: mobile
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Bootstrap Flutter platforms
        script: |
          cd "$PROJECT_DIR"
          if [ ! -d android ] || [ ! -d ios ]; then
            flutter create --project-name drive_mobile --platforms=android,ios .
          fi
      - name: Get Flutter packages
        script: |
          cd "$PROJECT_DIR"
          flutter pub get
      - name: Analyze Flutter app
        script: |
          cd "$PROJECT_DIR"
          flutter analyze
      - name: Run Flutter tests
        script: |
          cd "$PROJECT_DIR"
          flutter test
      - name: Build Android release APK
        script: |
          cd "$PROJECT_DIR"
          flutter build apk --release
      - name: Build iOS release app bundle
        script: |
          cd "$PROJECT_DIR"
          flutter build ios --release --no-codesign
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk
      - mobile/build/ios/iphoneos/*.app
