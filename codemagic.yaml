workflows:
  mobile-flutter-build:
    name: Drive Flutter app (mobile subfolder)
    environment:
      flutter: stable
      vars:
        PROJECT_NAME: drive_mobile
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Bootstrap Flutter platforms
        script: |
          cd mobile || exit 1
          required_platform_files=(
            android/gradlew
            android/gradlew.bat
            android/gradle/wrapper/gradle-wrapper.jar
            android/gradle/wrapper/gradle-wrapper.properties
            android/app/src/main/AndroidManifest.xml
            ios/Podfile
            ios/Runner/Info.plist
            ios/Runner.xcodeproj/project.pbxproj
            ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme
            ios/Runner.xcworkspace/contents.xcworkspacedata
          )

          regenerate_platforms=0
          for file in "${required_platform_files[@]}"; do
            if [ ! -e "$file" ]; then
              echo "Platform file missing, will attempt regeneration: $file"
              regenerate_platforms=1
              break
            fi
          done

          if [ "$regenerate_platforms" -eq 1 ]; then
            echo "Regenerating Flutter platform files with flutter create ."
            flutter create .
          fi

          for file in "${required_platform_files[@]}"; do
            if [ ! -e "$file" ]; then
              echo "Required Flutter platform file is still missing after regeneration: $file"
              exit 1
            fi
          done
      - name: Get Flutter packages
        script: |
          cd mobile && flutter pub get
      - name: Analyze Flutter app
        script: |
          cd mobile && flutter analyze
      - name: Run Flutter tests
        script: |
          cd mobile && flutter test
      - name: Build Android release APK
        script: |
          cd mobile && flutter build apk --release
      - name: Build iOS release app bundle
        script: |
          cd mobile && flutter build ios --release --no-codesign
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk
      - mobile/build/ios/iphoneos/Runner.app
