global:
  scrape_interval: 15s

scrape_configs:
  - job_name: backend
    static_configs:
      - targets:
          - drive-backend:80
  - job_name: redis
    static_configs:
      - targets:
          - drive-redis:6379
  - job_name: node-exporter
    static_configs:
      - targets:
          - drive-node-exporter:9100
