apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "drive-platform.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "drive-platform.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.NODE_ENV | quote }}
  API_BASE_URL: {{ .Values.config.API_BASE_URL | quote }}
  REDIS_URL: {{ .Values.config.REDIS_URL | quote }}
  DATABASE_URL: {{ .Values.config.DATABASE_URL | quote }}
  RABBITMQ_URL: {{ .Values.config.RABBITMQ_URL | quote }}
  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "drive-platform.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "drive-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.STRIPE_WEBHOOK_SECRET | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.POSTGRES_PASSWORD | quote }}
  RABBITMQ_PASSWORD: {{ .Values.secrets.RABBITMQ_PASSWORD | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.GRAFANA_ADMIN_PASSWORD | quote }}
  ELASTIC_PASSWORD: {{ .Values.secrets.ELASTIC_PASSWORD | quote }}
