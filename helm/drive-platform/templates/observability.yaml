---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "drive-platform.fullname" . }}-filebeat
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "drive-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: filebeat
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: filestream
        id: container-logs
        paths:
          - /var/log/containers/*.log
    output.logstash:
      hosts: ["{{ include "drive-platform.fullname" . }}-logstash:{{ .Values.logging.logstash.service.port }}"]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "drive-platform.fullname" . }}-filebeat
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "drive-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: filebeat
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "drive-platform.name" . }}
      app.kubernetes.io/component: filebeat
  template:
    metadata:
      labels:
        {{- include "drive-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: filebeat
    spec:
      serviceAccountName: {{ include "drive-platform.serviceAccountName" . }}
      containers:
        - name: filebeat
          image: {{ .Values.logging.filebeat.image }}
          args: ["-c", "/usr/share/filebeat/filebeat.yml", "-e"]
          volumeMounts:
            - name: config
              mountPath: /usr/share/filebeat/filebeat.yml
              subPath: filebeat.yml
            - name: container-logs
              mountPath: /var/log/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "drive-platform.fullname" . }}-filebeat
        - name: container-logs
          hostPath:
            path: /var/log/containers
{{- end }}
