<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f7f7f7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container-main { max-width: 960px; margin: 0 auto; padding: 28px 16px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08); margin-bottom: 18px; }
        .card-header { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); color: #fff; border-radius: 12px 12px 0 0 !important; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0">Driver Settings</h1>
            <a class="btn btn-outline-secondary btn-sm" href="/driver-dashboard.html">Back to Dashboard</a>
        </div>
        <div id="settings-alert" class="alert d-none" role="alert"></div>

        <form id="driver-settings-form">
            <div class="card">
                <div class="card-header">Profile</div>
                <div class="card-body row g-2">
                    <div class="col-md-6">
                        <label class="form-label" for="settings-full-name">Full Name</label>
                        <input id="settings-full-name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="settings-phone">Phone</label>
                        <input id="settings-phone" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Payment Method</div>
                <div class="card-body row g-2">
                    <div class="col-md-6">
                        <label class="form-label" for="settings-bank-name">Bank Name</label>
                        <input id="settings-bank-name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="settings-account-last4">Account Last 4</label>
                        <input id="settings-account-last4" class="form-control" maxlength="4" required>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Vehicle Information</div>
                <div class="card-body row g-2">
                    <div class="col-md-4">
                        <label class="form-label" for="settings-vehicle-make">Make</label>
                        <input id="settings-vehicle-make" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="settings-vehicle-model">Model</label>
                        <input id="settings-vehicle-model" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="settings-vehicle-plate">Plate Number</label>
                        <input id="settings-vehicle-plate" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Emergency Contact</div>
                <div class="card-body row g-2">
                    <div class="col-md-6">
                        <label class="form-label" for="settings-emergency-name">Contact Name</label>
                        <input id="settings-emergency-name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="settings-emergency-phone">Contact Phone</label>
                        <input id="settings-emergency-phone" class="form-control" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
    </div>
    <script src="/driver-settings.js"></script>
</body>
</html>
