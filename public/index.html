<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link href="/styles.css" rel="stylesheet" />
  </head>
  <body class="dashboard-layout">
    <div class="dashboard-grid">

      <!-- Left panel: 4 dashboard cards -->
      <div class="dashboard-left">
        <div class="dashboard-brand mb-4">
          <span class="dashboard-logo">&#9650;</span>
          <span class="dashboard-brand-name">Drive Platform</span>
        </div>
        <p class="dashboard-tagline">Real-time admin overview</p>

        <div class="dashboard-cards">
          <div class="dash-card">
            <div class="dash-card-icon">&#128663;</div>
            <div class="dash-card-body">
              <div class="dash-card-label">Active Drivers</div>
              <div class="dash-card-value">1,248</div>
            </div>
          </div>

          <div class="dash-card">
            <div class="dash-card-icon">&#128205;</div>
            <div class="dash-card-body">
              <div class="dash-card-label">Total Rides Today</div>
              <div class="dash-card-value">8,540</div>
            </div>
          </div>

          <div class="dash-card">
            <div class="dash-card-icon">&#128176;</div>
            <div class="dash-card-body">
              <div class="dash-card-label">Revenue (Today)</div>
              <div class="dash-card-value">$42,310</div>
            </div>
          </div>

          <div class="dash-card">
            <div class="dash-card-icon">&#128203;</div>
            <div class="dash-card-body">
              <div class="dash-card-label">Open Support Tickets</div>
              <div class="dash-card-value">73</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right panel: Admin login form -->
      <div class="login-panel">
        <div class="login-box">
          <h2 class="login-title">Admin Login</h2>
          <p class="login-subtitle">Sign in to your admin account</p>

          <ul class="nav nav-pills nav-fill mb-4" id="auth-tabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="login-tab" data-form="login" type="button">Login</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="signup-tab" data-form="signup" type="button">Sign up</button>
            </li>
          </ul>

          <div id="auth-error" class="alert alert-danger d-none" role="alert"></div>
          <div id="auth-success" class="alert alert-success d-none" role="alert"></div>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="login-email" class="form-label">Email</label>
              <input id="login-email" name="email" type="email" class="form-control" autocomplete="email" required />
            </div>
            <div class="mb-3">
              <label for="login-password" class="form-label">Password</label>
              <input id="login-password" name="password" type="password" class="form-control" autocomplete="current-password" required />
            </div>
            <button id="login-btn" type="submit" class="btn btn-dark w-100">
              <span class="btn-text">Sign In</span>
              <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
            </button>
          </form>

          <form id="signup-form" class="d-none" novalidate>
            <div class="mb-3">
              <label for="signup-email" class="form-label">Email</label>
              <input id="signup-email" name="email" type="email" class="form-control" autocomplete="email" required />
            </div>
            <div class="mb-3">
              <label for="signup-password" class="form-label">Password</label>
              <input id="signup-password" name="password" type="password" class="form-control" autocomplete="new-password" minlength="12" required />
              <div class="form-text">At least 12 characters with upper, lower, number, and symbol.</div>
            </div>
            <div class="mb-3">
              <label for="signup-role" class="form-label">Role</label>
              <select id="signup-role" name="role" class="form-select">
                <option value="rider" selected>Rider</option>
                <option value="driver">Driver</option>
                <option value="merchant">Merchant</option>
              </select>
            </div>
            <button id="signup-btn" type="submit" class="btn btn-success w-100">
              <span class="btn-text">Create account</span>
              <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
            </button>
          </form>
        </div>
      </div>

    </div>
    <script src="/index.js" defer></script>
  </body>
</html>
