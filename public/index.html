<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="/styles.css" rel="stylesheet" />
  </head>
  <body class="app-bg">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 fw-bold text-center mb-2">Drive</h1>
              <p class="text-body-secondary text-center mb-4">Sign in or create a new account.</p>

              <ul class="nav nav-pills nav-fill mb-3" id="auth-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="login-tab" data-form="login" type="button">Login</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="signup-tab" data-form="signup" type="button">Sign up</button>
                </li>
              </ul>

              <div id="auth-error" class="alert alert-danger d-none" role="alert"></div>
              <div id="auth-success" class="alert alert-success d-none" role="alert"></div>

              <form id="login-form" novalidate>
                <div class="mb-3">
                  <label for="login-email" class="form-label">Email</label>
                  <input id="login-email" name="email" type="email" class="form-control" autocomplete="email" required />
                </div>
                <div class="mb-3">
                  <label for="login-password" class="form-label">Password</label>
                  <input id="login-password" name="password" type="password" class="form-control" autocomplete="current-password" required />
                </div>
                <button id="login-btn" type="submit" class="btn btn-primary w-100">
                  <span class="btn-text">Login</span>
                  <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
                </button>
              </form>

              <form id="signup-form" class="d-none" novalidate>
                <div class="mb-3">
                  <label for="signup-email" class="form-label">Email</label>
                  <input id="signup-email" name="email" type="email" class="form-control" autocomplete="email" required />
                </div>
                <div class="mb-3">
                  <label for="signup-password" class="form-label">Password</label>
                  <input id="signup-password" name="password" type="password" class="form-control" autocomplete="new-password" minlength="12" required />
                  <div class="form-text">At least 12 chars with upper, lower, number, and symbol.</div>
                </div>
                <div class="mb-3">
                  <label for="signup-role" class="form-label">Role</label>
                  <select id="signup-role" name="role" class="form-select">
                    <option value="rider" selected>Rider</option>
                    <option value="driver">Driver</option>
                    <option value="merchant">Merchant</option>
                  </select>
                </div>
                <button id="signup-btn" type="submit" class="btn btn-success w-100">
                  <span class="btn-text">Create account</span>
                  <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="/index.js" defer></script>
  </body>
</html>
