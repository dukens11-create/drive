services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: drive
      POSTGRES_PASSWORD: drive_local
      POSTGRES_DB: drive_local
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U drive -d drive_local']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATA_STORE_MODE: file
      DATA_STORE_FILE: /app/.data/store.json
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ******postgres:5432/drive_local
    ports:
      - '8080:8080'
    volumes:
      - drive_data:/app/.data

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATA_STORE_MODE: file
      DATA_STORE_FILE: /app/.data/store.json
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ******postgres:5432/drive_local
    command: ['node', 'dist/worker.js']
    volumes:
      - drive_data:/app/.data

  admin:
    build:
      context: ./admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://api:8080
    ports:
      - '3001:3000'
    depends_on:
      - api

  passenger-web:
    build:
      context: ./web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://api:8080
    ports:
      - '3002:3000'
    depends_on:
      - api

  restaurant-web-dashboard:
    build:
      # The restaurant dashboard currently reuses the admin Next.js workspace.
      context: ./admin
      dockerfile: Dockerfile.restaurant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://api:8080
    ports:
      - '3003:3000'
    depends_on:
      - api

volumes:
  drive_data:
  postgres_data:
