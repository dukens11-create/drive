services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATA_STORE_MODE: file
      DATA_STORE_FILE: /app/.data/store.json
      REDIS_URL: redis://redis:6379
    ports:
      - '8080:8080'
    volumes:
      - drive_data:/app/.data

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATA_STORE_MODE: file
      DATA_STORE_FILE: /app/.data/store.json
      REDIS_URL: redis://redis:6379
    command: ['node', 'dist/worker.js']
    volumes:
      - drive_data:/app/.data

volumes:
  drive_data:
