components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GenericRequest:
      type: object
      additionalProperties: true
      properties:
        requestId:
          type: string
        data:
          type: object
          additionalProperties: true
    GenericResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        data:
          type: object
          additionalProperties: true
        error:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
  responses:
    BadRequest:
      description: Invalid input payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            badRequest:
              value:
                error: Invalid input
    Unauthorized:
      description: Missing or invalid auth token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                error: Invalid token
    Forbidden:
      description: Authenticated but lacks required role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                error: Forbidden
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
            description: Seconds until next allowed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unhandled server exception
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
