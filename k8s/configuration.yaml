apiVersion: v1
kind: ConfigMap
metadata:
  name: drive-platform-config
  namespace: drive-development
data:
  NODE_ENV: development
  API_BASE_URL: https://api.dev.drive.local
  REDIS_URL: redis://redis:6379
---
apiVersion: v1
kind: Secret
metadata:
  name: drive-platform-secrets
  namespace: drive-development
type: Opaque
stringData:
  JWT_SECRET: replace-in-cluster-secret-store
  STRIPE_WEBHOOK_SECRET: replace-in-cluster-secret-store
