apiVersion: apps/v1
kind: Deployment
metadata:
  name: drive-backend
  namespace: drive-development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drive-backend
  template:
    metadata:
      labels:
        app: drive-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/dukens11-create/drive-api:development
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: drive-platform-config
            - secretRef:
                name: drive-platform-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: drive-backend
  namespace: drive-development
spec:
  selector:
    app: drive-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
